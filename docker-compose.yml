name: mediarr

services:
  mediarr:
    build: .
    image: mediarr:local
    container_name: mediarr
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8080:8080"
    environment:
      MEDIARR_ADMIN_TOKEN: ${MEDIARR_ADMIN_TOKEN:-}
      MEDIARR_OVERSIZED_BYTES: ${MEDIARR_OVERSIZED_BYTES:-60000000000}
      MEDIARR_OLLAMA_URL: ${MEDIARR_OLLAMA_URL:-http://ollama:11434}
      MEDIARR_AI_MODEL: ${MEDIARR_AI_MODEL:-qwen3:0.6b}
      MEDIARR_TMDB_TOKEN: ${MEDIARR_TMDB_TOKEN:-}
      MEDIARR_THETVDB_API_KEY: ${MEDIARR_THETVDB_API_KEY:-}
      MEDIARR_OPENSUBTITLES_API_KEY: ${MEDIARR_OPENSUBTITLES_API_KEY:-}
      MEDIARR_JELLYFIN_URL: ${MEDIARR_JELLYFIN_URL:-}
      MEDIARR_JELLYFIN_API_KEY: ${MEDIARR_JELLYFIN_API_KEY:-}
      MEDIARR_PLEX_URL: ${MEDIARR_PLEX_URL:-}
      MEDIARR_PLEX_TOKEN: ${MEDIARR_PLEX_TOKEN:-}
      MEDIARR_EMBY_URL: ${MEDIARR_EMBY_URL:-}
      MEDIARR_EMBY_API_KEY: ${MEDIARR_EMBY_API_KEY:-}
      MEDIAAR_ADMIN_TOKEN: ${MEDIAAR_ADMIN_TOKEN:-}
      MEDIAAR_OVERSIZED_BYTES: ${MEDIAAR_OVERSIZED_BYTES:-}
      MEDIAAR_OLLAMA_URL: ${MEDIAAR_OLLAMA_URL:-}
      MEDIA_STEWARD_ADMIN_TOKEN: ${MEDIA_STEWARD_ADMIN_TOKEN:-}
      MEDIA_STEWARD_OVERSIZED_BYTES: ${MEDIA_STEWARD_OVERSIZED_BYTES:-}
      MEDIA_STEWARD_OLLAMA_URL: ${MEDIA_STEWARD_OLLAMA_URL:-}
    volumes:
      - ./config:/config
      - ${MOVIES_DIR:-./fixtures/media/movies}:/media/movies:ro
      - ${SERIES_DIR:-./fixtures/media/series}:/media/series:ro
      - ${ANIME_DIR:-./fixtures/media/anime}:/media/anime:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  ollama:
    image: ollama/ollama:latest
    container_name: mediarr-ollama
    restart: unless-stopped
    profiles: ["ai"]
    volumes:
      - ollama:/root/.ollama
  mediarr-ai-init:
    image: ollama/ollama:latest
    container_name: mediarr-ai-init
    profiles: ["ai"]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      MEDIARR_AI_MODEL: ${MEDIARR_AI_MODEL:-qwen3:0.6b}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      until ollama list >/dev/null 2>&1; do
        sleep 2
      done
      ollama pull "$$MEDIARR_AI_MODEL"
    restart: "no"

volumes:
  ollama:
