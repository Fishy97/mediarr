name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum
      - run: go test ./...
        working-directory: backend
      - run: go vet ./...
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test -- --run
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          mkdir -p config
          {
            echo "PUID=$(id -u)"
            echo "PGID=$(id -g)"
          } > .env
      - run: docker compose config --quiet
      - run: docker compose --profile ai config --quiet
      - run: docker compose build mediarr
      - run: docker compose up -d mediarr
      - run: |
          for attempt in $(seq 1 20); do
            if curl -fsS http://localhost:8080/api/v1/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs mediarr
          exit 1
      - run: curl -fsS http://localhost:8080/api/v1/setup/status
      - run: test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/catalog)" = "401"
      - if: always()
        run: docker compose down -v
